<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Matrix Puzzle Room</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        font-family: monospace;
        color: #00ff66;
    }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 0;
    }

    .screen {
        position: relative;
        z-index: 2;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 25px;
    }

    .panel {
        width: 220px;
        height: 160px;
        border: 2px solid #00ff66;
        box-shadow: 0 0 20px #00ff66;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        cursor: pointer;
        background: rgba(0, 20, 0, 0.75);
        transition: transform 0.4s, box-shadow 0.4s;
        padding: 15px;
    }

    .panel:hover {
        transform: scale(1.08);
        box-shadow: 0 0 35px #00ff66;
    }

    .zoomed {
        position: fixed;
        width: 70vw;
        height: 70vh;
        top: 15vh;
        left: 15vw;
        z-index: 5;
        transform: scale(1);
        background: rgba(0, 0, 0, 0.95);
    }

    .hidden {
        display: none;
    }

    input {
        background: black;
        color: #00ff66;
        border: 1px solid #00ff66;
        padding: 10px;
        font-size: 18px;
        text-align: center;
    }

    button {
        margin-top: 15px;
        background: black;
        color: #00ff66;
        border: 1px solid #00ff66;
        padding: 10px 20px;
        cursor: pointer;
        font-family: monospace;
    }

    button:hover {
        background: #00ff66;
        color: black;
    }

    .success {
        animation: pulse 0.25s infinite alternate;
    }

    @keyframes pulse {
        from { box-shadow: 0 0 20px #00ff66; }
        to { box-shadow: 0 0 80px #00ff66; }
    }

    .modal {
        position: fixed;
        z-index: 10;
        top: 20%;
        left: 25%;
        width: 50%;
        min-height: 250px;
        background: black;
        border: 3px solid #00ff66;
        box-shadow: 0 0 50px #00ff66;
        padding: 30px;
        text-align: center;
    }

    .modal h1 {
        color: #00ff66;
    }

    .reward {
        color: white;
        font-size: 20px;
        margin-top: 25px;
    }
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="screen">

    <div class="panel" onclick="zoomPanel(this)">
        ACCESS NODE 01<br><br>
        “The answer hides in plain sight.”
    </div>

    <div class="panel" onclick="zoomPanel(this)">
        ACCESS NODE 02<br><br>
        Clue: Follow the green code.
    </div>

    <div class="panel" onclick="zoomPanel(this)">
        ACCESS NODE 03<br><br>
        Enter the password:<br><br>
        <input id="answer" placeholder="Type answer">
        <br>
        <button onclick="checkAnswer(event)">Submit</button>
    </div>

</div>

<div id="rewardModal" class="modal hidden">
    <h1>ACCESS GRANTED</h1>
    <p>System unlocked.</p>

    <div class="reward">
        Reward Information:<br><br>
        <strong>The safe code is: 7-2-9-4</strong><br><br>
        Proceed to the next objective.
    </div>

    <button onclick="closeReward()">Close</button>
</div>

<script>
/* MATRIX RAIN BACKGROUND */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "アカサタナハマヤラワ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 16;
const columns = canvas.width / fontSize;

const drops = [];
for (let i = 0; i < columns; i++) {
    drops[i] = 1;
}

function drawMatrix() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff66";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }

        drops[i]++;
    }
}

setInterval(drawMatrix, 35);

/* BASIC SOUND EFFECTS */
function playBeep(freq = 440, duration = 120) {
    const audioCtx = new AudioContext();
    const oscillator = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    oscillator.connect(gain);
    gain.connect(audioCtx.destination);

    oscillator.frequency.value = freq;
    oscillator.type = "square";

    oscillator.start();

    gain.gain.exponentialRampToValueAtTime(
        0.00001,
        audioCtx.currentTime + duration / 1000
    );

    setTimeout(() => {
        oscillator.stop();
    }, duration);
}

/* CLICK TO ZOOM */
function zoomPanel(panel) {
    playBeep(520, 100);

    document.querySelectorAll(".panel").forEach(p => {
        if (p !== panel) p.classList.remove("zoomed");
    });

    panel.classList.toggle("zoomed");
}

/* PUZZLE LOGIC */
function checkAnswer(event) {
    event.stopPropagation();

    const input = document.getElementById("answer").value.trim().toLowerCase();

    if (input === "matrix") {
        playBeep(900, 300);

        document.body.classList.add("success");

        setTimeout(() => {
            document.getElementById("rewardModal").classList.remove("hidden");
        }, 900);

    } else {
        playBeep(160, 300);
        alert("ACCESS DENIED");
    }
}

function closeReward() {
    document.getElementById("rewardModal").classList.add("hidden");
}
</script>

</body>
</html>
