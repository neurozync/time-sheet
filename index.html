<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LCD Shooter Mobile</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  font-family: monospace;
  color: #ccc;
}

/* Device frame */
.device {
  padding: 16px;
  background: linear-gradient(145deg, #8a8c8a, #d8dad6, #5e605e);
  border-radius: 22px;
  box-shadow:
    inset 0 0 10px #fff6,
    inset 0 0 25px #0007,
    0 15px 40px #000;
}

/* Screen */
.screen-wrap {
  background: #000;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: inset 0 0 20px #000;
}

canvas {
  width: 92vw;
  max-width: 520px;
  height: auto;
  image-rendering: pixelated;
  display: block;

  /* 🔥 cleaner contrast */
  filter: contrast(1.6) brightness(1.2);
}

/* Controls */
.controls {
  margin-top: 18px;
  display: flex;
  gap: 20px;
}

.pad {
  display: grid;
  grid-template-columns: 60px 60px 60px;
  grid-template-rows: 60px 60px 60px;
  gap: 6px;
}

.btn {
  background: #1f1f1f;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: #fff;
  user-select: none;
  touch-action: none;
}

.btn:active {
  background: #444;
}

.shoot {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  font-size: 20px;
  background: #222;
}

.shoot:active {
  background: #555;
}
</style>
</head>
<body>

<div class="device">
  <div class="screen-wrap">
    <canvas id="game" width="190" height="108"></canvas>
  </div>
</div>

<div class="controls">
  <div class="pad">
    <div></div>
    <div class="btn" id="up">▲</div>
    <div></div>

    <div class="btn" id="left">◀</div>
    <div></div>
    <div class="btn" id="right">▶</div>

    <div></div>
    <div class="btn" id="down">▼</div>
    <div></div>
  </div>

  <div class="btn shoot" id="shoot">FIRE</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

let keys = {};
let gameOver = false;

function bindButton(id, key) {
  const el = document.getElementById(id);

  el.addEventListener("touchstart", e => {
    e.preventDefault();
    keys[key] = true;
  });

  el.addEventListener("touchend", () => keys[key] = false);
}

bindButton("up", "up");
bindButton("down", "down");
bindButton("left", "left");
bindButton("right", "right");

document.getElementById("shoot").addEventListener("touchstart", e => {
  e.preventDefault();
  shoot();
});

/* --- GAME --- */
let player = { x: 10, y: 50, w: 10, h: 6, cd: 0 };
let bullets = [];
let enemyShots = [];
let lives = 3;
let score = 580;

function shoot() {
  if (player.cd <= 0 && !gameOver) {
    bullets.push({ x: player.x + 10, y: player.y + 2, vx: 3 });
    player.cd = 12;
  }
}

function update() {
  if (gameOver) return;

  if (keys["up"]) player.y -= 1.5;
  if (keys["down"]) player.y += 1.5;
  if (keys["left"]) player.x -= 1.5;
  if (keys["right"]) player.x += 1.5;

  player.y = Math.max(10, Math.min(90, player.y));
  player.x = Math.max(5, Math.min(80, player.x));

  if (player.cd > 0) player.cd--;

  bullets.forEach(b => b.x += b.vx);
  bullets = bullets.filter(b => b.x < 200);
}

function px(x,y,w=1,h=1){
  ctx.fillRect(x|0,y|0,w,h);
}

function draw() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0,0,190,108);

  ctx.fillStyle = "#fff";

  /* player */
  px(player.x, player.y, 10, 3);
  px(player.x+6, player.y+2, 8, 2);

  /* bullets */
  bullets.forEach(b => px(b.x, b.y, 4, 1));

  /* HUD */
  for (let i=0;i<lives;i++){
    px(5+i*8,5,5,3);
  }

  ctx.font="8px monospace";
  ctx.fillText(score,130,10);

  if (gameOver){
    ctx.fillText("GAME OVER",60,60);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
