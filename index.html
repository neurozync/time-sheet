<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#05050a;
}

canvas{
    position:fixed;
    inset:0;
}

</style>
</head>
<body>

<canvas id="bg"></canvas>

<script>

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

let lightning = 0;

const fog = [];
const particles = [];

for(let i=0;i<40;i++){
    fog.push({
        x:Math.random()*innerWidth,
        y:Math.random()*innerHeight,
        r:150+Math.random()*350,
        dx:0.05+Math.random()*0.2
    });
}

for(let i=0;i<300;i++){
    particles.push({
        x:Math.random()*innerWidth,
        y:Math.random()*innerHeight,
        size:Math.random()*2,
        speed:0.05+Math.random()*0.3,
        alpha:Math.random()*0.4
    });
}

function drawGradient(){

    const g = ctx.createLinearGradient(
        0,0,
        0,canvas.height
    );

    g.addColorStop(0,"#020204");
    g.addColorStop(.4,"#090816");
    g.addColorStop(1,"#000000");

    ctx.fillStyle=g;
    ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawFog(){

    fog.forEach(f=>{

        f.x += f.dx;

        if(f.x-f.r > canvas.width){
            f.x = -f.r;
        }

        const grad = ctx.createRadialGradient(
            f.x,f.y,0,
            f.x,f.y,f.r
        );

        grad.addColorStop(
            0,
            "rgba(170,170,220,0.05)"
        );

        grad.addColorStop(
            1,
            "rgba(0,0,0,0)"
        );

        ctx.fillStyle=grad;

        ctx.beginPath();
        ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
        ctx.fill();
    });
}

function drawParticles(){

    particles.forEach(p=>{

        p.y -= p.speed;

        if(p.y < 0){
            p.y = canvas.height;
            p.x = Math.random()*canvas.width;
        }

        ctx.fillStyle =
        `rgba(255,255,255,${p.alpha})`;

        ctx.beginPath();
        ctx.arc(
            p.x,
            p.y,
            p.size,
            0,
            Math.PI*2
        );
        ctx.fill();
    });
}

function shadowPulse(time){

    const alpha =
    0.03 +
    Math.sin(time*0.0005)*0.02;

    ctx.fillStyle =
    `rgba(30,0,40,${alpha})`;

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );
}

function doLightning(){

    if(Math.random() > 0.9985){
        lightning = 1;
    }

    if(lightning > 0){

        ctx.fillStyle =
        `rgba(255,255,255,${lightning*0.18})`;

        ctx.fillRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

        lightning *= 0.9;
    }
}

function animate(time){

    drawGradient();

    drawFog();

    drawParticles();

    shadowPulse(time);

    doLightning();

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
