<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halloween Background</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    background: linear-gradient(to bottom, #050505, #0f0f18);
    height: 100vh;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
}
</style>
</head>
<body>

<canvas id="scene"></canvas>

<script>
const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const bats = [];
const particles = [];

let lightningAlpha = 0;

class Bat {
    constructor() {
        this.reset();
    }

    reset() {
        this.x = -100;
        this.y = Math.random() * canvas.height * 0.5;
        this.speed = 2 + Math.random() * 3;
        this.size = 10 + Math.random() * 20;
        this.wing = 0;
    }

    update() {
        this.x += this.speed;
        this.wing += 0.3;

        if (this.x > canvas.width + 100) {
            this.reset();
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);

        const flap = Math.sin(this.wing) * this.size * 0.5;

        ctx.strokeStyle = "#000";
        ctx.lineWidth = 3;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(-this.size, -flap, -this.size * 2, 0);
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(this.size, -flap, this.size * 2, 0);
        ctx.stroke();

        ctx.restore();
    }
}

class Ember {
    constructor() {
        this.reset();
    }

    reset() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + 50;
        this.size = Math.random() * 4;
        this.speed = 0.5 + Math.random() * 1.5;
        this.alpha = 0.2 + Math.random() * 0.6;
    }

    update() {
        this.y -= this.speed;
        if (this.y < -20) this.reset();
    }

    draw() {
        ctx.beginPath();
        ctx.fillStyle = `rgba(255,100,0,${this.alpha})`;
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

for (let i = 0; i < 15; i++) {
    bats.push(new Bat());
}

for (let i = 0; i < 150; i++) {
    particles.push(new Ember());
}

function drawMoon() {
    const x = canvas.width - 180;
    const y = 120;

    const glow = ctx.createRadialGradient(x, y, 20, x, y, 120);
    glow.addColorStop(0, "rgba(255,255,220,0.9)");
    glow.addColorStop(1, "rgba(255,255,220,0)");

    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(x, y, 120, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#f5f0d0";
    ctx.beginPath();
    ctx.arc(x, y, 50, 0, Math.PI * 2);
    ctx.fill();
}

function drawFog() {
    const time = Date.now() * 0.0002;

    for (let i = 0; i < 8; i++) {
        ctx.fillStyle = `rgba(200,200,200,0.03)`;

        ctx.beginPath();
        ctx.ellipse(
            ((time * 500) + i * 250) % (canvas.width + 500),
            canvas.height * 0.75,
            300,
            80,
            0,
            0,
            Math.PI * 2
        );
        ctx.fill();
    }
}

function drawHouse() {
    const baseY = canvas.height - 100;

    ctx.fillStyle = "#050505";

    ctx.fillRect(150, baseY - 180, 220, 180);

    ctx.beginPath();
    ctx.moveTo(120, baseY - 180);
    ctx.lineTo(260, baseY - 300);
    ctx.lineTo(400, baseY - 180);
    ctx.fill();

    if (Math.random() > 0.95) {
        ctx.fillStyle = "#ff9900";
        ctx.fillRect(190, baseY - 120, 30, 40);
        ctx.fillRect(290, baseY - 120, 30, 40);
    }
}

function triggerLightning() {
    if (Math.random() > 0.997) {
        lightningAlpha = 0.8;
    }
}

function drawLightning() {
    if (lightningAlpha > 0.01) {
        ctx.fillStyle = `rgba(255,255,255,${lightningAlpha})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        lightningAlpha *= 0.92;
    }
}

function animate() {

    triggerLightning();

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawMoon();
    drawFog();

    particles.forEach(p => {
        p.update();
        p.draw();
    });

    bats.forEach(b => {
        b.update();
        b.draw();
    });

    drawHouse();
    drawLightning();

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
