<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prank Button</title>
<style>
  body{font-family:Arial;margin:0;background:#111;color:white;text-align:center;overflow:hidden}
  #app{padding:25px}
  button{font-size:22px;padding:16px 22px;border-radius:14px;border:0;margin:10px}
  #main{background:#ff3b3b;color:white}
  #exit{background:#444;color:white;position:fixed;bottom:12px;left:12px;z-index:9999}
  .popup,.thing{position:fixed;z-index:1000}
  .popup{background:white;color:black;padding:15px;border-radius:12px;box-shadow:0 0 20px #000}
  .thing{font-size:34px;pointer-events:none}
</style>
</head>
<body>
<div id="app">
  <h1>Do NOT Press This Button</h1>
  <p>Seriously. Nothing good happens.</p>
  <button id="main">Press Me</button>
</div>
<button id="exit" onclick="resetPrank()">Exit / Reset</button>

<script>
let count = 0;
let timers = [];

const jokes = [
  fakeLoading,
  moveButton,
  popupStorm,
  emojiRain,
  fakeError,
  rotateScreen,
  colorFlash,
  tinyText,
  hugeText,
  reverseText,
  fakeCrack,
  runawayMessage,
  randomBuzz,
  fakeUpdate,
  clownMode,
  buttonMultiply,
  screenShake,
  passwordJoke,
  fakeBattery,
  finalBoss
];

const main = document.getElementById("main");

main.onclick = () => {
  jokes[count % jokes.length]();
  count++;
};

function rand(max){ return Math.floor(Math.random()*max); }

function fakeLoading(){
  document.body.insertAdjacentHTML("beforeend",
    `<div class="popup" style="top:30%;left:15%">Loading prank... 99%</div>`);
}

function moveButton(){
  main.style.position="fixed";
  main.style.left=rand(innerWidth-140)+"px";
  main.style.top=rand(innerHeight-100)+"px";
  main.innerText="Too slow";
}

function popupStorm(){
  for(let i=0;i<5;i++){
    document.body.insertAdjacentHTML("beforeend",
      `<div class="popup" style="top:${rand(80)}%;left:${rand(70)}%">Are you sure?</div>`);
  }
}

function emojiRain(){
  let t=setInterval(()=>{
    let e=document.createElement("div");
    e.className="thing";
    e.innerText=["😂","🤡","💀","👀","🚨"][rand(5)];
    e.style.left=rand(innerWidth)+"px";
    e.style.top="-40px";
    document.body.appendChild(e);
    let y=-40;
    let fall=setInterval(()=>{
      y+=8; e.style.top=y+"px";
      if(y>innerHeight){e.remove();clearInterval(fall);}
    },30);
  },150);
  timers.push(t);
}

function fakeError(){
  alert("ERROR: User pressed the forbidden button.");
}

function rotateScreen(){
  document.body.style.transform="rotate(3deg)";
}

function colorFlash(){
  let colors=["red","blue","purple","green","orange","black"];
  let t=setInterval(()=>document.body.style.background=colors[rand(colors.length)],200);
  timers.push(t);
}

function tinyText(){
  document.body.style.fontSize="8px";
  main.innerText="I got smaller";
}

function hugeText(){
  document.body.style.fontSize="40px";
  main.innerText="BIG MISTAKE";
}

function reverseText(){
  document.getElementById("app").style.transform="scaleX(-1)";
}

function fakeCrack(){
  document.body.insertAdjacentHTML("beforeend",
    `<div class="thing" style="top:20%;left:10%;font-size:120px">💥</div>`);
}

function runawayMessage(){
  let d=document.createElement("div");
  d.className="popup";
  d.innerText="Catch me";
  document.body.appendChild(d);
  let t=setInterval(()=>{
    d.style.left=rand(innerWidth-100)+"px";
    d.style.top=rand(innerHeight-80)+"px";
  },400);
  timers.push(t);
}

function randomBuzz(){
  if(navigator.vibrate) navigator.vibrate([100,50,100,50,200]);
}

function fakeUpdate(){
  document.body.insertAdjacentHTML("beforeend",
    `<div class="popup" style="top:25%;left:10%;right:10%">
      Installing joke update...<br><progress max="100" value="99"></progress><br>Stuck at 99%
    </div>`);
}

function clownMode(){
  main.innerText="HONK";
  document.body.insertAdjacentHTML("beforeend",
    `<div class="thing" style="top:35%;left:35%;font-size:90px">🤡</div>`);
}

function buttonMultiply(){
  for(let i=0;i<6;i++){
    let b=document.createElement("button");
    b.innerText="Nope";
    b.style.position="fixed";
    b.style.left=rand(innerWidth-100)+"px";
    b.style.top=rand(innerHeight-80)+"px";
    b.onclick=moveButton;
    document.body.appendChild(b);
  }
}

function screenShake(){
  let t=setInterval(()=>{
    document.body.style.transform=`translate(${rand(10)-5}px,${rand(10)-5}px)`;
  },50);
  timers.push(t);
}

function passwordJoke(){
  let p=prompt("Enter the secret password:");
  alert(p === "password" ? "Wrong. Too obvious." : "Wrong. Obviously.");
}

function fakeBattery(){
  document.body.insertAdjacentHTML("beforeend",
    `<div class="popup" style="top:15%;left:8%;right:8%">
      Warning: Comedy battery critically low.
    </div>`);
}

function finalBoss(){
  document.body.innerHTML = `
    <div id="app">
      <h1>FINAL BOSS MODE</h1>
      <p>You survived the prank gauntlet.</p>
      <button onclick="location.reload()">Escape</button>
    </div>
  `;
}

function resetPrank(){
  timers.forEach(clearInterval);
  location.reload();
}
</script>
</body>
</html>
