<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SKY OPS RADAR</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root{
  --bg:#05080c;
  --panel:#0d1621;
  --panel2:#111f2e;
  --line:#2d4158;
  --blue:#38bdf8;
  --green:#21c45a;
  --amber:#f6c945;
  --red:#ff3b3b;
  --text:#e8f1f8;
  --muted:#91a4b8;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,Helvetica,sans-serif;
  overflow:hidden;
}

#map{
  height:100vh;
  width:100vw;
  background:#020407;
}

.header{
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  z-index:1000;
  background:linear-gradient(180deg,#101d2b,#08111b);
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px;
  box-shadow:0 0 25px #000;
}

.title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
}

.title h1{
  margin:0;
  font-size:16px;
  letter-spacing:2px;
  color:var(--blue);
}

.status{
  font-size:10px;
  color:var(--green);
  border:1px solid var(--green);
  padding:4px 7px;
  border-radius:999px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{opacity:.6}
  50%{opacity:1}
  100%{opacity:.6}
}

.metrics{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  margin-top:8px;
}

.metric{
  background:#07101a;
  border:1px solid var(--line);
  border-radius:10px;
  padding:7px;
  text-align:center;
}

.metric b{
  display:block;
  color:var(--blue);
  font-size:14px;
}

.metric span{
  color:var(--muted);
  font-size:9px;
}

.controls{
  position:absolute;
  bottom:14px;
  left:10px;
  right:10px;
  z-index:1000;
  background:linear-gradient(180deg,#101d2b,#08111b);
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px;
  box-shadow:0 0 25px #000;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
}

button,select{
  width:100%;
  padding:11px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#07101a;
  color:var(--text);
  font-weight:bold;
  letter-spacing:.5px;
}

button{
  cursor:pointer;
}

.primary{
  border-color:var(--blue);
  color:var(--blue);
}

.green{
  border-color:var(--green);
  color:var(--green);
}

.amber{
  border-color:var(--amber);
  color:var(--amber);
}

.aircraft-icon{
  color:#38bdf8;
  font-size:24px;
  text-shadow:0 0 8px #38bdf8;
  transform-origin:center;
}

.user-dot{
  width:18px;
  height:18px;
  background:#38bdf8;
  border:3px solid white;
  border-radius:50%;
  box-shadow:0 0 20px #38bdf8;
}

.popup{
  font-size:12px;
  line-height:1.5;
}

.popup b{
  color:#38bdf8;
}

.warning{
  margin-top:8px;
  font-size:10px;
  color:var(--muted);
  line-height:1.3;
}

@media(max-width:480px){
  .metrics{grid-template-columns:repeat(2,1fr)}
  .row{grid-template-columns:1fr 1fr}
  .title h1{font-size:14px}
}
</style>
</head>

<body>

<div id="map"></div>

<div class="header">
  <div class="title">
    <h1>SKY OPS RADAR</h1>
    <div class="status" id="systemStatus">STANDBY</div>
  </div>

  <div class="metrics">
    <div class="metric"><b id="aircraftCount">0</b><span>AIRCRAFT</span></div>
    <div class="metric"><b id="gpsAccuracy">--</b><span>GPS ACCURACY</span></div>
    <div class="metric"><b id="radiusText">50 MI</b><span>SCAN RADIUS</span></div>
    <div class="metric"><b id="lastUpdate">--</b><span>LAST UPDATE</span></div>
  </div>

  <div class="warning">
    Public ADS-B only. Military/government aircraft appear only when broadcasting public position data.
  </div>
</div>

<div class="controls">
  <div class="row">
    <button class="green" onclick="startSystem()">START GPS</button>
    <button class="primary" onclick="fetchAircraft()">REFRESH</button>
    <select id="radius" onchange="updateRadius()">
      <option value="10">10 MI</option>
      <option value="25">25 MI</option>
      <option value="50" selected>50 MI</option>
      <option value="100">100 MI</option>
      <option value="200">200 MI</option>
    </select>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map;
let userMarker;
let accuracyCircle;
let aircraftLayer;
let radarRings = [];
let userLat = 33.4484;
let userLon = -112.0740;
let scanRadiusMiles = 50;
let autoRefresh;
let watchId;

function initMap(){
  map = L.map("map", {
    zoomControl:false
  }).setView([userLat,userLon], 9);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom:19,
    attribution:"© OpenStreetMap | OpenSky Network"
  }).addTo(map);

  aircraftLayer = L.layerGroup().addTo(map);
  L.control.zoom({position:"topright"}).addTo(map);
  drawUserPosition(userLat,userLon,1000);
  drawRadarRings();
}

function startSystem(){
  document.getElementById("systemStatus").textContent = "ACQUIRING GPS";

  if(!navigator.geolocation){
    alert("GPS not supported on this device/browser.");
    return;
  }

  watchId = navigator.geolocation.watchPosition(pos => {
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;

    const accuracy = pos.coords.accuracy || 0;
    document.getElementById("gpsAccuracy").textContent =
      accuracy < 1609 ? Math.round(accuracy * 3.28084) + " FT" : (accuracy / 1609.34).toFixed(1) + " MI";

    drawUserPosition(userLat,userLon,accuracy);
    drawRadarRings();
    map.setView([userLat,userLon], getZoomForRadius(scanRadiusMiles));

    document.getElementById("systemStatus").textContent = "LIVE";
    fetchAircraft();

    clearInterval(autoRefresh);
    autoRefresh = setInterval(fetchAircraft, 10000);

  }, err => {
    alert("GPS permission denied or unavailable. Enable location permission and use HTTPS.");
    document.getElementById("systemStatus").textContent = "GPS ERROR";
  }, {
    enableHighAccuracy:true,
    maximumAge:0,
    timeout:15000
  });
}

function drawUserPosition(lat,lon,accuracy){
  const icon = L.divIcon({
    className:"",
    html:"<div class='user-dot'></div>",
    iconSize:[18,18],
    iconAnchor:[9,9]
  });

  if(userMarker){
    userMarker.setLatLng([lat,lon]);
  }else{
    userMarker = L.marker([lat,lon],{icon}).addTo(map).bindPopup("YOUR GPS POSITION");
  }

  if(accuracyCircle){
    accuracyCircle.setLatLng([lat,lon]);
    accuracyCircle.setRadius(accuracy);
  }else{
    accuracyCircle = L.circle([lat,lon],{
      radius:accuracy,
      color:"#38bdf8",
      fillColor:"#38bdf8",
      fillOpacity:.12,
      weight:1
    }).addTo(map);
  }
}

function drawRadarRings(){
  radarRings.forEach(r => map.removeLayer(r));
  radarRings = [];

  [5,10,25,50,100].forEach(mi => {
    if(mi <= scanRadiusMiles){
      const ring = L.circle([userLat,userLon],{
        radius:mi * 1609.34,
        color:"#38bdf8",
        fill:false,
        opacity:.35,
        weight:1,
        dashArray:"4,8"
      }).addTo(map);
      radarRings.push(ring);
    }
  });
}

function updateRadius(){
  scanRadiusMiles = Number(document.getElementById("radius").value);
  document.getElementById("radiusText").textContent = scanRadiusMiles + " MI";
  drawRadarRings();
  fetchAircraft();
}

function getZoomForRadius(mi){
  if(mi <= 10) return 11;
  if(mi <= 25) return 10;
  if(mi <= 50) return 9;
  if(mi <= 100) return 8;
  return 7;
}

function milesToDegreesLat(mi){
  return mi / 69;
}

function milesToDegreesLon(mi,lat){
  return mi / (69 * Math.cos(lat * Math.PI / 180));
}

async function fetchAircraft(){
  document.getElementById("systemStatus").textContent = "SCANNING";

  const latDelta = milesToDegreesLat(scanRadiusMiles);
  const lonDelta = milesToDegreesLon(scanRadiusMiles,userLat);

  const lamin = userLat - latDelta;
  const lamax = userLat + latDelta;
  const lomin = userLon - lonDelta;
  const lomax = userLon + lonDelta;

  const url = `https://opensky-network.org/api/states/all?lamin=${lamin}&lomin=${lomin}&lamax=${lamax}&lomax=${lomax}`;

  try{
    const res = await fetch(url);
    if(!res.ok) throw new Error("OpenSky request failed");
    const data = await res.json();

    aircraftLayer.clearLayers();

    const states = data.states || [];
    let count = 0;

    states.forEach(s => {
      const aircraft = parseAircraft(s);
      if(!aircraft.lat || !aircraft.lon) return;

      count++;
      addAircraftMarker(aircraft);
    });

    document.getElementById("aircraftCount").textContent = count;
    document.getElementById("lastUpdate").textContent = new Date().toLocaleTimeString();
    document.getElementById("systemStatus").textContent = "LIVE";

  }catch(e){
    document.getElementById("systemStatus").textContent = "API ERROR";
    console.error(e);
  }
}

function parseAircraft(s){
  return {
    icao:s[0],
    callsign:(s[1] || "UNKNOWN").trim(),
    country:s[2] || "UNKNOWN",
    lon:s[5],
    lat:s[6],
    baroAlt:s[7],
    onGround:s[8],
    velocity:s[9],
    heading:s[10],
    verticalRate:s[11],
    geoAlt:s[13],
    squawk:s[14],
    lastContact:s[4]
  };
}

function classifyAircraft(a){
  const c = a.callsign.toUpperCase();

  if(c.includes("RCH") || c.includes("REACH") || c.includes("AF") || c.includes("NAVY") || c.includes("ARMY")) return "POSSIBLE MIL/GOV";
  if(c.includes("LIFE") || c.includes("MEDEVAC") || c.includes("AIRCARE")) return "POSSIBLE MEDICAL";
  if(c.includes("POL") || c.includes("SHERIFF") || c.includes("DPS")) return "POSSIBLE LAW ENFORCEMENT";
  if((a.baroAlt || 0) < 6000 && (a.velocity || 0) < 90) return "LOW/SLOW AIRCRAFT";
  return "PUBLIC ADS-B";
}

function addAircraftMarker(a){
  const heading = a.heading || 0;
  const type = classifyAircraft(a);

  let color = "#38bdf8";
  if(type.includes("MIL")) color = "#f6c945";
  if(type.includes("LAW")) color = "#ff3b3b";
  if(type.includes("MEDICAL")) color = "#21c45a";

  const icon = L.divIcon({
    className:"",
    html:`<div class="aircraft-icon" style="color:${color};text-shadow:0 0 8px ${color};transform:rotate(${heading}deg)">✈</div>`,
    iconSize:[28,28],
    iconAnchor:[14,14]
  });

  const distance = distanceMiles(userLat,userLon,a.lat,a.lon).toFixed(1);
  const altitude = a.geoAlt || a.baroAlt;
  const altitudeFt = altitude ? Math.round(altitude * 3.28084).toLocaleString() + " FT" : "UNKNOWN";
  const speedMph = a.velocity ? Math.round(a.velocity * 2.23694) + " MPH" : "UNKNOWN";

  L.marker([a.lat,a.lon],{icon})
    .addTo(aircraftLayer)
    .bindPopup(`
      <div class="popup">
        <b>${a.callsign || "UNKNOWN"}</b><br>
        TYPE: ${type}<br>
        ICAO: ${a.icao}<br>
        COUNTRY: ${a.country}<br>
        ALTITUDE: ${altitudeFt}<br>
        SPEED: ${speedMph}<br>
        HEADING: ${Math.round(heading)}°<br>
        DISTANCE: ${distance} MI<br>
        SQUAWK: ${a.squawk || "N/A"}<br>
        ON GROUND: ${a.onGround ? "YES" : "NO"}
      </div>
    `);
}

function distanceMiles(lat1,lon1,lat2,lon2){
  const R = 3958.8;
  const dLat = deg2rad(lat2-lat1);
  const dLon = deg2rad(lon2-lon1);
  const x =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  return R * 2 * Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function deg2rad(d){
  return d * Math.PI / 180;
}

initMap();
</script>

</body>
</html>
