<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SKY OPS RADAR</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root{
  --bg:#02060a;
  --panel:#07111d;
  --panel2:#0d1b2a;
  --line:#28435f;
  --blue:#38bdf8;
  --green:#22c55e;
  --amber:#facc15;
  --red:#ef4444;
  --purple:#a855f7;
  --text:#e5eef8;
  --muted:#94a3b8;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:#02060a;
  color:var(--text);
  font-family:Arial,Helvetica,sans-serif;
  overflow:hidden;
}

#map{
  height:100vh;
  width:100vw;
  background:#02060a;
}

.hud{
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  z-index:1000;
  background:linear-gradient(180deg,#0e1d2d,#07111d);
  border:1px solid var(--line);
  border-radius:16px;
  padding:10px;
  box-shadow:0 0 30px #000;
}

.title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
}

.title h1{
  margin:0;
  font-size:16px;
  letter-spacing:2px;
  color:var(--blue);
}

.live{
  font-size:10px;
  color:var(--green);
  border:1px solid var(--green);
  padding:4px 8px;
  border-radius:999px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{opacity:.55}
  50%{opacity:1}
  100%{opacity:.55}
}

.metrics{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  margin-top:8px;
}

.metric{
  background:#030b13;
  border:1px solid var(--line);
  border-radius:10px;
  padding:7px;
  text-align:center;
}

.metric b{
  display:block;
  color:var(--blue);
  font-size:14px;
}

.metric span{
  font-size:9px;
  color:var(--muted);
}

.controls{
  position:absolute;
  bottom:12px;
  left:10px;
  right:10px;
  z-index:1000;
  background:linear-gradient(180deg,#0e1d2d,#07111d);
  border:1px solid var(--line);
  border-radius:16px;
  padding:10px;
  box-shadow:0 0 30px #000;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
}

button,select{
  width:100%;
  padding:11px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#030b13;
  color:var(--text);
  font-weight:bold;
  letter-spacing:.5px;
}

button{cursor:pointer}

.blue{border-color:var(--blue);color:var(--blue)}
.green{border-color:var(--green);color:var(--green)}
.amber{border-color:var(--amber);color:var(--amber)}

.notice{
  margin-top:7px;
  color:var(--muted);
  font-size:10px;
  line-height:1.3;
}

.aircraft-icon{
  font-size:24px;
  transform-origin:center;
}

.fireball-icon{
  font-size:24px;
  filter:drop-shadow(0 0 8px #f97316);
}

.user-dot{
  width:18px;
  height:18px;
  background:var(--blue);
  border:3px solid white;
  border-radius:50%;
  box-shadow:0 0 20px var(--blue);
}

.popup{
  font-size:12px;
  line-height:1.5;
}

.popup b{color:var(--blue)}
.popup .fire{color:#fb923c}

@media(max-width:520px){
  .metrics{grid-template-columns:repeat(2,1fr)}
  .row{grid-template-columns:1fr 1fr}
  .title h1{font-size:14px}
}
</style>
</head>

<body>

<div id="map"></div>

<div class="hud">
  <div class="title">
    <h1>SKY OPS RADAR</h1>
    <div class="live" id="systemStatus">STANDBY</div>
  </div>

  <div class="metrics">
    <div class="metric"><b id="aircraftCount">0</b><span>AIRCRAFT</span></div>
    <div class="metric"><b id="fireballCount">0</b><span>FIREBALLS</span></div>
    <div class="metric"><b id="gpsAccuracy">--</b><span>GPS ACCURACY</span></div>
    <div class="metric"><b id="lastUpdate">--</b><span>UPDATED</span></div>
  </div>

  <div class="notice">
    Public ADS-B only. Military/government aircraft show only when publicly broadcasting and tagged. NASA fireballs are reported events, not live meteor radar.
  </div>
</div>

<div class="controls">
  <div class="row">
    <button class="green" onclick="startSystem()">START GPS</button>
    <button class="blue" onclick="refreshAll()">REFRESH</button>
    <select id="radius" onchange="updateRadius()">
      <option value="10">10 MI</option>
      <option value="25">25 MI</option>
      <option value="50" selected>50 MI</option>
      <option value="100">100 MI</option>
      <option value="200">200 MI</option>
    </select>
  </div>
  <div class="row" style="margin-top:8px">
    <button class="blue" onclick="toggleAircraft()">AIRCRAFT</button>
    <button class="amber" onclick="toggleFireballs()">FIREBALLS</button>
    <button class="blue" onclick="centerOnUser()">CENTER</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map;
let userLat = 33.4484;
let userLon = -112.0740;
let scanRadiusMiles = 50;

let userMarker;
let accuracyCircle;
let aircraftLayer;
let fireballLayer;
let radarRings = [];
let aircraftVisible = true;
let fireballsVisible = true;
let autoAircraftTimer;
let autoFireballTimer;

function $(id){ return document.getElementById(id); }

function initMap(){
  map = L.map("map",{zoomControl:false}).setView([userLat,userLon],9);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
    maxZoom:19,
    attribution:"© OpenStreetMap | Airplanes.live | NASA/JPL CNEOS"
  }).addTo(map);

  aircraftLayer = L.layerGroup().addTo(map);
  fireballLayer = L.layerGroup().addTo(map);

  L.control.zoom({position:"topright"}).addTo(map);

  drawUserPosition(userLat,userLon,1000);
  drawRadarRings();
}

function startSystem(){
  $("systemStatus").textContent = "GPS LOCKING";

  if(!navigator.geolocation){
    alert("GPS not supported.");
    return;
  }

  navigator.geolocation.watchPosition(pos=>{
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;

    const acc = pos.coords.accuracy || 0;
    $("gpsAccuracy").textContent =
      acc < 1609 ? Math.round(acc * 3.28084) + " FT" : (acc/1609.34).toFixed(1) + " MI";

    drawUserPosition(userLat,userLon,acc);
    drawRadarRings();
    centerOnUser();

    $("systemStatus").textContent = "LIVE";

    refreshAll();

    clearInterval(autoAircraftTimer);
    clearInterval(autoFireballTimer);

    autoAircraftTimer = setInterval(fetchAircraft,15000);
    autoFireballTimer = setInterval(fetchFireballs,300000);

  },err=>{
    $("systemStatus").textContent = "GPS ERROR";
    alert("Enable location permission and use HTTPS/GitHub Pages.");
  },{
    enableHighAccuracy:true,
    maximumAge:0,
    timeout:15000
  });
}

function centerOnUser(){
  map.setView([userLat,userLon],zoomForRadius(scanRadiusMiles));
}

function updateRadius(){
  scanRadiusMiles = Number($("radius").value);
  drawRadarRings();
  fetchAircraft();
  centerOnUser();
}

function zoomForRadius(mi){
  if(mi <= 10) return 11;
  if(mi <= 25) return 10;
  if(mi <= 50) return 9;
  if(mi <= 100) return 8;
  return 7;
}

function drawUserPosition(lat,lon,accuracy){
  const icon = L.divIcon({
    className:"",
    html:"<div class='user-dot'></div>",
    iconSize:[18,18],
    iconAnchor:[9,9]
  });

  if(userMarker){
    userMarker.setLatLng([lat,lon]);
  }else{
    userMarker = L.marker([lat,lon],{icon}).addTo(map).bindPopup("YOUR GPS POSITION");
  }

  if(accuracyCircle){
    accuracyCircle.setLatLng([lat,lon]);
    accuracyCircle.setRadius(accuracy);
  }else{
    accuracyCircle = L.circle([lat,lon],{
      radius:accuracy,
      color:"#38bdf8",
      fillColor:"#38bdf8",
      fillOpacity:.12,
      weight:1
    }).addTo(map);
  }
}

function drawRadarRings(){
  radarRings.forEach(r=>map.removeLayer(r));
  radarRings = [];

  [5,10,25,50,100,200].forEach(mi=>{
    if(mi <= scanRadiusMiles){
      const ring = L.circle([userLat,userLon],{
        radius:mi * 1609.34,
        color:"#38bdf8",
        fill:false,
        opacity:.28,
        weight:1,
        dashArray:"4,8"
      }).addTo(map);
      radarRings.push(ring);
    }
  });
}

function refreshAll(){
  fetchAircraft();
  fetchFireballs();
}

async function fetchAircraft(){
  $("systemStatus").textContent = "SCANNING";

  try{
    const radiusNm = Math.min(250, Math.round(scanRadiusMiles * 0.868976));
    const url = `https://api.airplanes.live/v2/point/${userLat}/${userLon}/${radiusNm}`;

    const res = await fetch(url);
    if(!res.ok) throw new Error("Aircraft HTTP " + res.status);

    const data = await res.json();
    const aircraft = data.ac || [];

    aircraftLayer.clearLayers();

    let count = 0;

    aircraft.forEach(ac=>{
      let lat = ac.lat;
      let lon = ac.lon;

      if((!lat || !lon) && ac.lastPosition){
        lat = ac.lastPosition.lat;
        lon = ac.lastPosition.lon;
      }

      if(!lat || !lon) return;

      count++;

      addAircraft({
        icao:ac.hex || "",
        callsign:(ac.flight || "UNKNOWN").trim(),
        lat:lat,
        lon:lon,
        alt:ac.alt_geom || ac.alt_baro,
        speed:ac.gs,
        heading:ac.track || 0,
        squawk:ac.squawk,
        type:ac.t || "",
        reg:ac.r || "",
        category:ac.category || "",
        dbFlags:ac.dbFlags || 0,
        seen:ac.seen_pos
      });
    });

    $("aircraftCount").textContent = count;
    $("lastUpdate").textContent = new Date().toLocaleTimeString();
    $("systemStatus").textContent = "LIVE";

  }catch(e){
    console.error(e);
    $("systemStatus").textContent = "AIR API ERROR";
    $("lastUpdate").textContent = e.message;
  }
}

function classifyAircraft(a){
  const flags = a.dbFlags || 0;
  const cs = (a.callsign || "").toUpperCase();

  if(flags & 1) return {label:"MILITARY / GOV TAGGED", color:"#facc15"};
  if(cs.includes("POL") || cs.includes("DPS") || cs.includes("SHERIFF")) return {label:"POSSIBLE LAW ENFORCEMENT", color:"#ef4444"};
  if(cs.includes("LIFE") || cs.includes("MEDEVAC") || cs.includes("AIRCARE")) return {label:"POSSIBLE MEDICAL", color:"#22c55e"};
  if((a.alt || 0) < 6000 && (a.speed || 0) < 120) return {label:"LOW / SLOW AIRCRAFT", color:"#a855f7"};
  return {label:"PUBLIC ADS-B AIRCRAFT", color:"#38bdf8"};
}

function addAircraft(a){
  const c = classifyAircraft(a);

  const icon = L.divIcon({
    className:"",
    html:`<div class="aircraft-icon" style="color:${c.color};text-shadow:0 0 10px ${c.color};transform:rotate(${a.heading}deg)">✈</div>`,
    iconSize:[28,28],
    iconAnchor:[14,14]
  });

  const dist = distanceMiles(userLat,userLon,a.lat,a.lon).toFixed(1);
  const altFt = a.alt ? Math.round(a.alt * 3.28084).toLocaleString() + " FT" : "UNKNOWN";
  const speedMph = a.speed ? Math.round(a.speed * 1.15078) + " MPH" : "UNKNOWN";

  L.marker([a.lat,a.lon],{icon})
    .addTo(aircraftLayer)
    .bindPopup(`
      <div class="popup">
        <b>${a.callsign}</b><br>
        CLASS: ${c.label}<br>
        ICAO: ${a.icao || "N/A"}<br>
        REG: ${a.reg || "N/A"}<br>
        TYPE: ${a.type || "N/A"}<br>
        ALTITUDE: ${altFt}<br>
        SPEED: ${speedMph}<br>
        HEADING: ${Math.round(a.heading)}°<br>
        DISTANCE: ${dist} MI<br>
        SQUAWK: ${a.squawk || "N/A"}<br>
        SEEN: ${a.seen != null ? a.seen + " SEC AGO" : "N/A"}
      </div>
    `);
}

async function fetchFireballs(){
  try{
    const url = "https://ssd-api.jpl.nasa.gov/fireball.api?limit=25&req-loc=true";

    const res = await fetch(url);
    if(!res.ok) throw new Error("NASA HTTP " + res.status);

    const data = await res.json();

    fireballLayer.clearLayers();

    const fields = data.fields || [];
    const rows = data.data || [];

    const idx = {};
    fields.forEach((f,i)=>idx[f]=i);

    let count = 0;

    rows.forEach(r=>{
      const latRaw = r[idx["lat"]];
      const lonRaw = r[idx["lon"]];
      const latDir = r[idx["lat-dir"]];
      const lonDir = r[idx["lon-dir"]];

      if(!latRaw || !lonRaw || !latDir || !lonDir) return;

      let lat = parseFloat(latRaw);
      let lon = parseFloat(lonRaw);

      if(latDir === "S") lat *= -1;
      if(lonDir === "W") lon *= -1;

      count++;

      const date = r[idx["date"]] || "UNKNOWN";
      const alt = r[idx["alt"]] || "N/A";
      const vel = r[idx["vel"]] || "N/A";
      const energy = r[idx["energy"]] || "N/A";
      const impact = r[idx["impact-e"]] || "N/A";

      addFireball({lat,lon,date,alt,vel,energy,impact});
    });

    $("fireballCount").textContent = count;

  }catch(e){
    console.error(e);
  }
}

function addFireball(f){
  const icon = L.divIcon({
    className:"",
    html:"<div class='fireball-icon'>☄</div>",
    iconSize:[28,28],
    iconAnchor:[14,14]
  });

  L.marker([f.lat,f.lon],{icon})
    .addTo(fireballLayer)
    .bindPopup(`
      <div class="popup">
        <b class="fire">NASA/JPL FIREBALL EVENT</b><br>
        DATE/TIME UTC: ${f.date}<br>
        LOCATION: ${f.lat.toFixed(2)}, ${f.lon.toFixed(2)}<br>
        ALTITUDE: ${f.alt} KM<br>
        VELOCITY: ${f.vel} KM/S<br>
        RADIATED ENERGY: ${f.energy} KT<br>
        IMPACT ENERGY: ${f.impact} KT<br>
        NOTE: Reported atmospheric-entry event, not live radar.
      </div>
    `);
}

function toggleAircraft(){
  if(aircraftVisible){
    map.removeLayer(aircraftLayer);
    aircraftVisible = false;
  }else{
    map.addLayer(aircraftLayer);
    aircraftVisible = true;
  }
}

function toggleFireballs(){
  if(fireballsVisible){
    map.removeLayer(fireballLayer);
    fireballsVisible = false;
  }else{
    map.addLayer(fireballLayer);
    fireballsVisible = true;
  }
}

function distanceMiles(lat1,lon1,lat2,lon2){
  const R = 3958.8;
  const dLat = deg2rad(lat2-lat1);
  const dLon = deg2rad(lon2-lon1);

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(deg2rad(lat1)) *
    Math.cos(deg2rad(lat2)) *
    Math.sin(dLon/2) *
    Math.sin(dLon/2);

  return R * 2 * Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function deg2rad(d){
  return d * Math.PI / 180;
}

initMap();
</script>

</body>
</html>
