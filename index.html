<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>8-Bit Fighter</title>

<style>
    body {
        margin: 0;
        background: #87ceeb;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    canvas {
        border: 4px solid black;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        background: #87ceeb;
    }
</style>
</head>

<body>

<canvas id="gameCanvas" width="500" height="500"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// PIXEL SIZE
const p = 8;

// Animation Variables
let blinkTimer = 0;
let blink = false;
let bobOffset = 0;
let bobDirection = 1;

// Fighter Position
const fighter = {
    x: 180,
    y: 140
};

// Main Animation Loop
function animate() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Bobbing movement
    bobOffset += 0.2 * bobDirection;

    if (bobOffset > 4 || bobOffset < -4) {
        bobDirection *= -1;
    }

    // Blinking
    blinkTimer++;

    if (blinkTimer > 100) {
        blink = true;
    }

    if (blinkTimer > 110) {
        blink = false;
        blinkTimer = 0;
    }

    drawFighter(fighter.x, fighter.y + bobOffset);

    requestAnimationFrame(animate);
}

function pixel(x, y, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x * p, y * p, p, p);
}

function drawFighter(offsetX, offsetY) {

    const ox = offsetX / p;
    const oy = offsetY / p;

    // =========================
    // HAIR
    // =========================

    const hair = "#111";

    for(let y = 0; y < 8; y++) {
        for(let x = 3; x < 11; x++) {
            pixel(ox + x, oy + y, hair);
        }
    }

    // Ponytail
    for(let y = 2; y < 12; y++) {
        pixel(ox + 1, oy + y, hair);
        pixel(ox + 2, oy + y, hair);
    }

    // Red tie
    pixel(ox + 2, oy + 2, "red");
    pixel(ox + 3, oy + 2, "red");
    pixel(ox + 2, oy + 3, "red");

    // =========================
    // FACE
    // =========================

    const skin = "#f2c7a5";

    for(let y = 5; y < 11; y++) {
        for(let x = 4; x < 10; x++) {
            pixel(ox + x, oy + y, skin);
        }
    }

    // Eyes
    if (!blink) {
        pixel(ox + 5, oy + 7, "black");
        pixel(ox + 8, oy + 7, "black");
    } else {
        pixel(ox + 5, oy + 7, "#663300");
        pixel(ox + 8, oy + 7, "#663300");
    }

    // =========================
    // BODY
    // =========================

    const shirt = "#444";

    for(let y = 11; y < 16; y++) {
        for(let x = 4; x < 10; x++) {
            pixel(ox + x, oy + y, shirt);
        }
    }

    // Arms
    for(let y = 11; y < 16; y++) {
        pixel(ox + 3, oy + y, skin);
        pixel(ox + 10, oy + y, skin);
    }

    // =========================
    // PANTS
    // =========================

    const pants = "#0a7a21";

    // Left leg
    for(let y = 16; y < 26; y++) {
        for(let x = 3; x < 6; x++) {
            pixel(ox + x, oy + y, pants);
        }
    }

    // Right leg
    for(let y = 16; y < 26; y++) {
        for(let x = 8; x < 11; x++) {
            pixel(ox + x, oy + y, pants);
        }
    }

    // Spread stance
    pixel(ox + 2, oy + 23, pants);
    pixel(ox + 11, oy + 23, pants);

    // =========================
    // BOOTS
    // =========================

    for(let x = 2; x < 6; x++) {
        pixel(ox + x, oy + 26, "black");
    }

    for(let x = 8; x < 12; x++) {
        pixel(ox + x, oy + 26, "black");
    }

    // =========================
    // FLOOR SHADOW
    // =========================

    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(offsetX - 20, offsetY + 220, 120, 10);
}

animate();
</script>

</body>
</html>
