<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timesheet</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
    --bg:#0a0f16;
    --panel:#0f1722;
    --panel-2:#131d2b;
    --line:#263445;
    --line-2:#33465c;
    --text:#e7edf5;
    --muted:#9fb0c3;
    --accent:#2d6cdf;
    --accent-2:#1e4fa8;
    --success:#1f9d55;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(180deg, #081019 0%, #0a0f16 100%);
    color:var(--text);
    padding:16px;
}

.container{max-width:1000px;margin:0 auto;}

.app-shell{
    background:rgba(15,23,34,.92);
    border:1px solid var(--line);
    box-shadow:0 10px 30px rgba(0,0,0,.35);
    border-radius:14px;
    padding:18px;
}

h1{
    text-align:center;
    letter-spacing:3px;
    font-size:42px;
    margin-bottom:18px;
    font-weight:800;
}

.header-box{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-bottom:16px;
}

.field label{
    display:block;
    font-size:13px;
    color:var(--muted);
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:1px;
    font-weight:700;
}

.top-input{
    width:100%;
    height:44px;
    border:1px solid var(--line-2);
    background:#0c1420;
    color:var(--text);
    border-radius:10px;
    padding:0 12px;
    outline:none;
}

.table-wrap{
    overflow-x:auto;
    border:1px solid var(--line);
    border-radius:12px;
    background:#0c1420;
}

table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

thead th{
    background:linear-gradient(180deg, #162131 0%, #121b28 100%);
    font-size:14px;
    font-weight:800;
    padding:14px 10px;
    border-bottom:1px solid var(--line-2);
    border-right:1px solid var(--line);
}

tbody td{
    padding:8px;
    border-top:1px solid var(--line);
    border-right:1px solid var(--line);
}

.row-input{
    width:100%;
    height:38px;
    border:1px solid #314357;
    background:#0b121c;
    color:var(--text);
    border-radius:8px;
    padding:0 10px;
}

.hours-cell{
    height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    border:1px solid #314357;
    background:#0b121c;
    border-radius:8px;
    font-weight:800;
}

.actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-top:14px;
}

button{
    height:46px;
    border:none;
    border-radius:10px;
    color:#fff;
    font-weight:800;
    cursor:pointer;
}

.btn-add{background:linear-gradient(180deg, var(--accent), var(--accent-2));}
.btn-pdf{background:linear-gradient(180deg, #1d8f52, #16673b);}

.footer-bar{
    margin-top:16px;
    display:flex;
    justify-content:space-between;
    padding:14px;
    border:1px solid var(--line);
    border-radius:12px;
}

.total{font-size:24px;font-weight:900;}
</style>
</head>

<body>

<div class="container">
<div class="app-shell">

<h1>TIMESHEET</h1>

<div class="header-box">
    <div class="field">
        <label>Name</label>
        <input id="name" class="top-input">
    </div>
    <div class="field">
        <label>Company / Contract</label>
        <input id="company" class="top-input">
    </div>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Date</th>
<th>Time In</th>
<th>Time Out</th>
<th>Hours</th>
<th>Detail</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="actions">
<button class="btn-add" onclick="addRow()">Add Entry</button>
<button class="btn-pdf" onclick="generatePDF()">Generate PDF</button>
</div>

<div class="footer-bar">
<div class="total">TOTAL HOURS: <span id="total">0.0</span></div>
</div>

</div>
</div>

<script>

// ✅ FIXED CALCULATION
function calcHours(timeIn, timeOut){
    if(!timeIn || !timeOut) return null;

    const [inH, inM] = timeIn.split(":").map(Number);
    const [outH, outM] = timeOut.split(":").map(Number);

    let start = inH * 60 + inM;
    let end = outH * 60 + outM;

    if(end < start){
        end += 1440;
    }

    return Math.round(((end - start) / 60) * 10) / 10;
}

// ✅ FORCE UPDATE
function updateRow(row){
    const timeIn = row.querySelector(".time-in").value;
    const timeOut = row.querySelector(".time-out").value;

    const hours = calcHours(timeIn, timeOut);

    row.querySelector(".hours-cell").textContent =
        hours === null ? "0.0" : hours.toFixed(1);

    calcTotal();
}

function calcTotal(){
    let total = 0;
    document.querySelectorAll(".hours-cell").forEach(cell=>{
        total += parseFloat(cell.textContent)||0;
    });
    document.getElementById("total").textContent = total.toFixed(1);
}

// ✅ CRITICAL FIX — DIRECT INPUT TRIGGER
function addRow(){
    const row = document.createElement("tr");

    row.innerHTML = `
        <td><input class="row-input" type="date"></td>

        <td>
            <input class="row-input time-in" type="time"
            oninput="updateRow(this.closest('tr'))">
        </td>

        <td>
            <input class="row-input time-out" type="time"
            oninput="updateRow(this.closest('tr'))">
        </td>

        <td><div class="hours-cell">0.0</div></td>

        <td><input class="row-input" type="text"></td>
    `;

    document.getElementById("tbody").appendChild(row);
}

function generatePDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let y = 20;

    doc.text("TIMESHEET",90,y);
    y+=10;

    doc.text("Name: "+document.getElementById("name").value,10,y);
    y+=6;
    doc.text("Company: "+document.getElementById("company").value,10,y);
    y+=10;

    document.querySelectorAll("#tbody tr").forEach(row=>{
        let h=row.querySelector(".hours-cell").textContent;
        doc.text("Hours: "+h,10,y);
        y+=6;
    });

    doc.text("TOTAL: "+document.getElementById("total").textContent,10,y+10);

    doc.save("timesheet.pdf");
}

// INIT
addRow();

</script>

</body>
</html>
