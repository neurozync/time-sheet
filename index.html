<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alien Pocket Pet</title>

<style>
body{
  margin:0;
  background:#0b0b0b;
  font-family:monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#fff;
}

/* DEVICE */
.device{
  width:360px;
  background:linear-gradient(#d9dbd4,#8c8f88);
  border-radius:28px;
  padding:18px;
  box-shadow:0 20px 40px #000;
}

.title{
  text-align:center;
  color:#333;
  font-weight:bold;
  letter-spacing:3px;
  margin-bottom:10px;
}

/* SCREEN */
.screen{
  background:#000;
  border-radius:12px;
  padding:6px;
  box-shadow:inset 0 0 15px #000;
}

canvas{
  width:100%;
  image-rendering:pixelated;
  display:block;
  filter:contrast(1.6) brightness(1.2);
}

/* ICON BAR */
.icons{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
}

.icon{
  width:32px;
  height:28px;
  background:#b8bbb2;
  border:1px solid #5c5f58;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.icon.active{
  background:#0d140d;
  color:#cfffba;
}

/* BUTTONS */
.controls{
  display:flex;
  gap:10px;
  margin-top:12px;
}

button{
  flex:1;
  height:50px;
  border:none;
  border-radius:12px;
  background:linear-gradient(#333,#000);
  color:#fff;
  font-weight:bold;
  box-shadow:0 5px 0 #000;
}

button:active{
  transform:translateY(4px);
  box-shadow:0 1px 0 #000;
}
</style>
</head>

<body>

<div class="device">

<div class="title">ALIEN POCKET PET</div>

<div class="screen">
<canvas id="game" width="160" height="96"></canvas>
</div>

<div class="icons" id="icons"></div>

<div class="controls">
<button id="left">◀</button>
<button id="mode">MODE</button>
<button id="enter">ENTER</button>
<button id="right">▶</button>
</div>

</div>

<script>
const ctx = game.getContext("2d");
ctx.imageSmoothingEnabled=false;

const P="#d9ffd0";
const B="#000";

const actions=["F","★","P","C","Z","+","!","?"];
let selected=0;

const iconsDiv=document.getElementById("icons");

actions.forEach((a,i)=>{
  let d=document.createElement("div");
  d.className="icon";
  d.textContent=a;
  d.onclick=()=>{selected=i;updateIcons();}
  iconsDiv.appendChild(d);
});

function updateIcons(){
  [...iconsDiv.children].forEach((e,i)=>{
    e.classList.toggle("active",i===selected);
  });
}
updateIcons();

/* SOUND */
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function beep(f=800,t=0.05){
  let o=audioCtx.createOscillator();
  let g=audioCtx.createGain();
  o.connect(g);
  g.connect(audioCtx.destination);
  o.frequency.value=f;
  o.type="square";
  g.gain.value=0.08;
  o.start();
  o.stop(audioCtx.currentTime+t);
}

/* PET */
let pet={
  hunger:80,
  happy:80,
  health:90,
  energy:80,
  clean:80
};

let poop=false;
let sleeping=false;
let dead=false;

/* INPUT */
left.onclick=()=>{selected=(selected+7)%8;updateIcons();beep();}
right.onclick=()=>{selected=(selected+1)%8;updateIcons();beep();}
mode.onclick=()=>{selected=(selected+1)%8;updateIcons();beep();}

enter.onclick=()=>{
  beep(1000,0.05);

  if(dead){
    reset();
    return;
  }

  switch(selected){
    case 0: pet.hunger+=15; break;
    case 1: pet.happy+=10; break;
    case 2: pet.happy+=15; pet.energy-=10; break;
    case 3: pet.clean=100; poop=false; break;
    case 4: sleeping=!sleeping; break;
    case 5: pet.health+=20; break;
    case 6: pet.happy-=5; break;
    case 7: break;
  }
  clamp();
};

function clamp(){
  for(let k in pet){
    pet[k]=Math.max(0,Math.min(100,pet[k]));
  }
}

/* DECAY LOOP */
setInterval(()=>{
  if(dead) return;

  pet.hunger-=2;
  pet.happy-=1;
  pet.clean-=1;
  pet.energy-=1;

  if(Math.random()<0.2) poop=true;

  if(poop) pet.health-=2;
  if(pet.hunger<20) pet.health-=2;

  if(pet.health<=0) dead=true;

  clamp();
},4000);

/* DRAW */
function px(x,y,w=1,h=1){
  ctx.fillRect(x,y,w,h);
}

function drawPet(){
  ctx.fillStyle=P;

  px(70,40,20,10);
  px(65,50,30,10);
  px(75,60,10,15);

  ctx.fillStyle=B;
  px(72,45,5,3);
  px(83,45,5,3);
}

function draw(){
  ctx.fillStyle=B;
  ctx.fillRect(0,0,160,96);

  if(dead){
    ctx.fillStyle=P;
    ctx.fillText("GAME OVER",40,50);
  } else {
    drawPet();

    if(poop){
      ctx.fillStyle=P;
      px(110,70,8,4);
    }

    if(pet.hunger<25 || pet.clean<25){
      ctx.fillStyle=P;
      ctx.fillText("!",140,20);
    }
  }

  requestAnimationFrame(draw);
}

function reset(){
  pet={hunger:80,happy:80,health:90,energy:80,clean:80};
  poop=false;
  dead=false;
}

draw();
</script>

</body>
</html>
